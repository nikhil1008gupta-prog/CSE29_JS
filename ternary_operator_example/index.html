<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ternary Operator Example</title>
</head>
<body>
    <h1>finding largest of the three numbers </h1>
    <script>
        var a = 10;
        var b = 20;
        var c = 15;
        document.write("The numbers are: " + a + ", " + b + ", " + c + "<br>");

        document.write("The largest number is: " + (a > b ? (a > c ? a : c) : (b > c ? b : c)));
    </script>
</body>
</html>
